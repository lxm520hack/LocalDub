[package]
name = "oar-rs"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "oar_ocr"
path = "src/main.rs"

[dependencies]
oar-ocr = { version = "0.7.1", features = ["auto-download"] }
image = "0.25"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
