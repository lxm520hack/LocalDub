[package]
name = "demucs-burn"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "demucs-burn-wgpu"
path = "src/main.rs"
required-features = ["cubecl-wgpu"]

[[bin]]
name = "demucs-burn-cpu"
path = "src/main.rs"
required-features = ["cubecl-cpu"]

[[bin]]
name = "demucs-burn-rocm"
path = "src/main.rs"
required-features = ["cubecl-rocm"]

[[bin]]
name = "demucs-burn-tch"
path = "src/main.rs"
required-features = ["tch"]

[[bin]]
name = "demucs-burn-cuda"
path = "src/main.rs"
required-features = ["cubecl-cuda"]

[features]
default = ["cubecl-wgpu"]
cubecl-wgpu = ["demucs-core/cubecl-wgpu"]
cubecl-cpu = ["demucs-core/cubecl-cpu"]
cubecl-rocm = ["demucs-core/cubecl-rocm"]
cubecl-cuda = ["demucs-core/cubecl-cuda"]
tch = ["demucs-core/tch"]
fusion = ["demucs-core/fusion"]
autotune = ["demucs-core/autotune"]

[dependencies]
demucs-core = { path = "../../../submodule/demucs-rs/demucs-core", default-features = false }
burn = { version = "0.20.1", default-features = false }
clap = { version = "4", features = ["derive"] }
hound = "3"
anyhow = "1"
pollster = "0.4"
