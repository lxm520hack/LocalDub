[package]
name = "fnrpc"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait.workspace = true
fnrpc-macros = { path = "../fnrpc-macros" }
serde.workspace = true
serde_json = "1"
specta.workspace = true
specta-typescript = "0.0.9"
tracing = { version = "0.1", optional = true }

[features]
tracing = ["dep:tracing"]

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }
