[package]
name = "subtitle-rust"
version = "0.2.0"
edition = "2021"

[[bin]]
name = "ocr_pipeline_rs"
path = "src/main.rs"

[dependencies]
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytemuck = "1"
ndarray = "0.15"
ort = { version = "2.0.0-rc.10", features = ["download-binaries"] }
opencv = { version = "0.98", default-features = false, features = ["imgproc"] }
